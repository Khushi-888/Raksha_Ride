{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper fade-in">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 40px;">
            <i class="ph ph-door-open" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="font-size: 32px; letter-spacing: -1px;">Login Portal</h2>
            <p style="color: var(--text-gray);">Access your secure dashboard</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <!-- Custom Styled Radio Toggles -->
            <div style="display: flex; background: var(--bg-input); padding: 5px; border-radius: 12px; margin-bottom: 30px;">
                <input type="radio" name="role" id="r_p" value="passenger" checked style="display: none;">
                <label for="r_p" id="l_p" class="role-selector active">Passenger</label>
                
                <input type="radio" name="role" id="r_d" value="driver" style="display: none;">
                <label for="r_d" id="l_d" class="role-selector">Driver</label>
            </div>

            <style>
                .role-selector { flex: 1; text-align: center; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; color: var(--text-gray); transition: 0.3s; }
                .role-selector.active { background: var(--primary); color: #000; }
            </style>

            <div class="form-group">
                <label class="form-label">Secure Email</label>
                <input type="email" name="email" class="form-input" required placeholder="name@domain.com">
            </div>

            <div class="form-group" style="margin-bottom: 35px;">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 60px;">
                Authenticate <i class="ph ph-lock-key"></i>
            </button>
        </form>

        <p style="text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 14px;">
            Not shielded yet? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 800;">Register Now</a>
        </p>
    </div>
</div>

<script>
    const lp = document.getElementById('l_p');
    const ld = document.getElementById('l_d');
    const rp = document.getElementById('r_p');
    const rd = document.getElementById('r_d');

    lp.onclick = () => { lp.classList.add('active'); ld.classList.remove('active'); rp.checked = true; };
    ld.onclick = () => { ld.classList.add('active'); lp.classList.remove('active'); rd.checked = true; };
</script>
{% endblock %}
