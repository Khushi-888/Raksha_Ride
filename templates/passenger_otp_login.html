<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - RakshaRide</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003366;
            --accent: #ff9933;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background: var(--white);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .icon {
            width: 70px;
            height: 70px;
            background: #e0f2fe;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--primary);
        }

        p {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.05);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); }
        .btn-accent { background: var(--accent); }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <i class="fas fa-lock"></i>
        </div>

        <h1>Identity Verification</h1>
        <p>You are scanning to verify <b>{{ driver['name'] }}</b>. Please verify your identity with a quick OTP to proceed.</p>

        <!-- Step 1: Email -->
        <div id="email-section">
            <div class="input-group">
                <label>Passenger Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>
            <button class="btn btn-primary" onclick="sendOTP()">Send Secure OTP</button>
        </div>

        <!-- Step 2: OTP -->
        <div id="otp-section" style="display:none;">
            <div class="input-group">
                <label>Enter 6-Digit Code</label>
                <input type="text" id="otp" maxlength="6" style="text-align:center; font-weight:800; letter-spacing:4px; font-size:24px;">
            </div>
            <button class="btn btn-accent" onclick="verifyOTP()">Verify & Continue</button>
        </div>

        <a href="/" class="back-link">Cancel and Return</a>
    </div>

    <script>
        async function sendOTP() {
            const email = document.getElementById('email').value.trim();
            if(!email) return alert("Email required");

            const res = await fetch('/api/passenger_scan_otp_request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('email-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
            } else {
                alert(data.message);
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otp').value.trim();
            
            const res = await fetch('/api/passenger_scan_otp_verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });
            const data = await res.json();
            
            if(data.success) {
                // Redirect back to same page to trigger driver details view
                location.reload();
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
