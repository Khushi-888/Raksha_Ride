<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Enrollment | RakshaRide Official</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-animated-parent">
    <div class="bg-animated"></div>
 
    <div class="center-container">
        <div class="card glass animate-fade-up" style="max-width: 650px; width: 100%; padding: 40px; margin: 40px 0;">
        <div class="header text-center mb-4">
            <div class="logo-container mb-3" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <img src="/static/img/logo.png" alt="RakshaRide Logo" style="height: 40px; border-radius: 8px;">
                <div class="text-left">
                    <div style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--primary); line-height: 1;">RakshaRide</div>
                    <div style="font-size: 0.6rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase;">OFFICIAL PORTAL</div>
                </div>
            </div>
            <h2 id="reg-title" style="font-size: 1.8rem; color: var(--primary);">Citizen Enrollment</h2>
            <p id="reg-subtitle" style="font-size: 0.9rem; color: var(--text-muted);">Government Grade Identity Integration ({{ type.capitalize() }})</p>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <div id="otp-init-section">
            <div class="form-group">
                <label class="form-label">Government Registered Email 📧</label>
                <div class="flex gap-2">
                    <input type="email" id="email" class="form-input" style="flex: 1;" placeholder="citizen@official.gov.in" required>
                    <button id="send-otp-btn" class="btn btn-primary" onclick="handleSendOTP()" style="white-space: nowrap; padding: 0 20px;">Get OTP</button>
                </div>
            </div>

            <div id="otp-verify-section" class="hidden animate-fade-up">
                <label class="form-label">Digital Security Token 🔐</label>
                <div class="flex gap-2">
                    <input type="text" id="otp" class="form-input" maxlength="6" style="flex: 1; text-align: center; letter-spacing: 15px; font-weight: 800;" placeholder="000000">
                    <button class="btn btn-accent" onclick="handleVerifyOTP()" style="white-space: nowrap; padding: 0 20px;">Verify Identity</button>
                </div>
                <p class="text-center mt-2" style="font-size: 0.8rem; color: var(--text-muted);">A 6-digit token has been sent to your inbox.</p>
            </div>
        </div>

        <div id="main-form" class="hidden animate-fade-up">
            <form id="enrollmentForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="mb-3">
                    <div class="form-group mb-0">
                        <label class="form-label">Full Name 👤</label>
                        <input type="text" id="name" class="form-input" placeholder="Official Name" required>
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Mobile Hub 📱</label>
                        <input type="tel" id="mobile" class="form-input" placeholder="10-digit primary" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Access Token (Password) 🔑</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-weight: 800; padding: 18px;">
                    ✅ Finalize Portal Enrollment
                </button>
            </form>
        </div>

        <div class="footer-text mt-4 text-center">
            Already enrolled? <a href="/login/{{ type }}" style="font-weight: 700; color: var(--primary);">Secure Portal Login</a>
        </div>
    </div>
    </div>

    <script src="/static/js/theme.js"></script>
    <script>
        const userType = "{{ type }}";
        
        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alert-box');
            box.innerText = msg;
            box.className = `alert alert-${type}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 5000);
        }

        async function handleSendOTP() {
            const email = document.getElementById('email').value.trim();
            if (!email) { showAlert("Email identification required."); return; }
            
            const btn = document.getElementById('send-otp-btn');
            // Prevent double-click spam
            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const res = await fetch('/api/send_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                // Safe JSON parse
                let data;
                try { data = await res.json(); }
                catch(e) { data = { success: false, message: 'Server error' }; }

                if (data.success) {
                    document.getElementById('otp-verify-section').classList.remove('hidden');
                    showAlert("Verification code sent! Check your email inbox (and spam folder).", "success");
                    // Reset button with resend countdown
                    let countdown = 60;
                    btn.innerText = `Resend in ${countdown}s`;
                    const timer = setInterval(() => {
                        countdown--;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.innerText = "Resend OTP";
                        } else {
                            btn.innerText = `Resend in ${countdown}s`;
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || "Failed to send OTP. Please try again.");
                    btn.disabled = false;
                    btn.innerText = "Get OTP";
                }
            } catch (err) {
                showAlert("Connection error. Please check your internet.");
                btn.disabled = false;
                btn.innerText = "Get OTP";
            }
        }

        async function handleVerifyOTP() {
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otp').value.trim();
            if (otp.length < 6) { showAlert("Please enter the full 6-digit OTP."); return; }
            if (!email) { showAlert("Email is required."); return; }

            const verifyBtn = document.querySelector('[onclick="handleVerifyOTP()"]');
            if (verifyBtn) { verifyBtn.disabled = true; verifyBtn.innerText = 'Verifying...'; }

            try {
                const res = await fetch('/api/verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('otp-init-section').classList.add('hidden');
                    document.getElementById('main-form').classList.remove('hidden');
                    showAlert("✅ OTP Verified! Please fill in your details below.", "success");
                } else {
                    const msg = data.message || "Invalid OTP.";
                    showAlert(msg + (msg.includes('not found') ? ' Please click Get OTP to request a new one.' : ''));
                }
            } catch (err) {
                showAlert("Connection error. Please check your internet and try again.");
            } finally {
                if (verifyBtn) { verifyBtn.disabled = false; verifyBtn.innerText = 'Verify Identity'; }
            }
        }

        document.getElementById('enrollmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !mobile || !password) {
                showAlert("All fields required."); return;
            }
            if (mobile.replace(/\D/g,'').length < 10) {
                showAlert("Enter a valid 10-digit mobile number."); return;
            }
            if (password.length < 6) {
                showAlert("Password must be at least 6 characters."); return;
            }

            const endpoint = userType === 'driver' ? '/api/register_driver' : '/api/register_passenger';
            if (userType === 'driver' && !window.location.pathname.includes('driver')) {
                window.location.href = '/register/driver';
                return;
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone: mobile, mobile, password })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert("✅ Enrollment Recorded. Redirecting...", "success");
                    setTimeout(() => window.location.href = `/login/${userType}`, 1500);
                } else {
                    showAlert(data.message || "Registration failed.");
                }
            } catch (err) { showAlert("Database Write Error."); }
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
