<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RakshaRide | Official Password Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #003366;
            --accent: #ff9933;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 51, 102, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
        }

        h2 {
            margin: 0 0 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            color: var(--primary);
            text-align: center;
        }

        p.desc {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: #002244;
            transform: translateY(-2px);
        }

        .msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .msg.err { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .msg.ok { background: #dcfce7; color: #22c55e; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div data-lucide="shield-check" style="color: var(--accent); width: 32px; height: 32px;"></div>
            <div class="logo-text">RakshaRide</div>
        </div>
        
        <h2>Official Verification</h2>
        <p class="desc">For security reasons, please update your temporary password before proceeding to your dashboard.</p>

        <div id="passwordForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new_password" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="Repeat new password">
            </div>
            
            <button class="btn" onclick="updatePassword()">
                Update & Access Dashboard
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </div>

        <div id="feedback" class="msg"></div>
    </div>

    <script>
        lucide.createIcons();

        async function updatePassword() {
            const new_pw = document.getElementById('new_password').value;
            const conf_pw = document.getElementById('confirm_password').value;
            const fb = document.getElementById('feedback');

            if (new_pw.length < 6) {
                fb.innerText = "Password must be at least 6 characters";
                fb.className = "msg err";
                fb.style.display = "block";
                return;
            }

            if (new_pw !== conf_pw) {
                fb.innerText = "Passwords do not match";
                fb.className = "msg err";
                fb.style.display = "block";
                return;
            }

            try {
                const res = await fetch('/api/update_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: new_pw, confirm_password: conf_pw })
                });
                const data = await res.json();

                if (data.success) {
                    fb.innerText = "Security profile updated! Redirecting...";
                    fb.className = "msg ok";
                    fb.style.display = "block";
                    setTimeout(() => window.location.href = data.redirect, 1500);
                } else {
                    fb.innerText = data.message;
                    fb.className = "msg err";
                    fb.style.display = "block";
                }
            } catch (e) {
                fb.innerText = "System error occurred. Please try again.";
                fb.className = "msg err";
                fb.style.display = "block";
            }
        }
    </script>
</body>
</html>
