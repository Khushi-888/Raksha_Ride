
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RakshaRide — Admin DB Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--y:#FFC107;--b:#1565C0;--g:#2E7D32;--r:#C62828;--bg:#F0F4FF;--card:#fff;--border:#DDE3F0;--text:#1A1A2E;--t2:#5A6480;--sb:#1A1A2E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.sb-logo .ic{width:36px;height:36px;background:linear-gradient(135deg,var(--y),var(--b));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo .tx{color:#fff;font-weight:700;font-size:0.9rem;line-height:1.2}
.sb-logo .tx small{display:block;color:rgba(255,255,255,0.4);font-size:0.65rem;font-weight:400}
.sb-sec{padding:14px 16px 4px;font-size:0.62rem;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px}
.tb-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:rgba(255,255,255,0.6);font-size:0.83rem;transition:all 0.2s;border-left:3px solid transparent}
.tb-btn:hover{background:rgba(255,255,255,0.05);color:#fff}
.tb-btn.active{background:rgba(255,193,7,0.12);color:var(--y);border-left-color:var(--y)}
.tb-btn .cnt{background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600}
.tb-btn.active .cnt{background:rgba(255,193,7,0.2);color:var(--y)}
.sb-footer{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08)}
.sb-footer a{color:rgba(255,255,255,0.4);font-size:0.78rem;text-decoration:none}
.sb-footer a:hover{color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-title{font-size:1rem;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:0.88;transform:translateY(-1px)}
.btn-y{background:var(--y);color:#000}
.btn-b{background:var(--b);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--border);color:var(--t2)}
.btn-out:hover{border-color:var(--y);color:var(--text)}
.stats-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:16px;overflow-x:auto;flex-shrink:0;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:8px;white-space:nowrap;padding:4px 0}
.stat-val{font-size:1.1rem;font-weight:800;color:var(--y)}
.stat-lbl{font-size:0.72rem;color:var(--t2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:3px}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tbl-title{font-size:1.1rem;font-weight:700}
.tbl-meta{font-size:0.78rem;color:var(--t2);margin-top:2px}
.search-box{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.83rem;width:200px;transition:all 0.2s}
.search-box:focus{outline:none;border-color:var(--y)}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
thead{background:var(--bg);position:sticky;top:0;z-index:1}
th{padding:10px 12px;text-align:left;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--t2);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,193,7,0.04)}
.null-v{color:var(--t2);font-style:italic;font-size:0.75rem}
.mono{font-family:'JetBrains Mono',monospace;font-size:0.75rem}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:0.7rem;font-weight:700}
.bg{background:#E8F5E9;color:#2E7D32}.bb{background:#E3F2FD;color:#1565C0}.by{background:#FFF8E1;color:#F57F17}.br{background:#FFEBEE;color:#C62828}.bgr{background:var(--bg);color:var(--t2)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border)}
.page-info{font-size:0.78rem;color:var(--t2)}
.empty{text-align:center;padding:48px 20px;color:var(--t2)}
.empty .ic{font-size:40px;margin-bottom:10px}
.loading{text-align:center;padding:32px;color:var(--t2)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--y);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;border-top:4px solid var(--y)}
.ov-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.ov-card .num{font-size:1.8rem;font-weight:800;color:var(--b)}
.ov-card .name{font-size:0.82rem;font-weight:600;margin-top:4px;color:var(--t2)}
.notif{position:fixed;top:68px;right:16px;padding:10px 18px;border-radius:10px;font-weight:600;font-size:0.85rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:toastIn 0.3s ease;color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9998;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:14px;padding:24px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:1rem;font-weight:700}
.field-lbl{display:block;font-size:0.7rem;font-weight:700;color:var(--t2);text-transform:uppercase;margin-bottom:4px}
.field-inp{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:12px;transition:border-color 0.2s}
.field-inp:focus{outline:none;border-color:var(--y)}
@media(max-width:768px){.sidebar{display:none}.stats-bar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo">
    <div class="ic">🛡️</div>
    <div class="tx">RakshaRide<small>Admin Panel</small></div>
  </div>
  <div class="sb-sec">Tables</div>
  <div id="tableList"><div style="padding:16px;color:rgba(255,255,255,0.3);font-size:0.8rem">Loading...</div></div>
  <div class="sb-footer">
    <a href="/admin/dashboard">← Admin Dashboard</a><br>
    <a href="/" style="margin-top:6px;display:block">← Main Site</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">📊 Database Overview</div>
    <div class="topbar-right">
      <button class="btn btn-y" onclick="refreshAll()">🔄 Refresh</button>
      <button class="btn btn-out" onclick="exportCSV()">⬇️ CSV</button>
      <button class="btn btn-r" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="loading" style="padding:8px">Loading stats...</div>
  </div>

  <div class="content" id="mainContent">
    <div id="overviewSection">
      <div class="overview-grid" id="overviewCards"></div>
    </div>
    <div id="tableSection" style="display:none">
      <div class="tbl-header">
        <div>
          <div class="tbl-title" id="tableTitle">Table</div>
          <div class="tbl-meta" id="tableMeta"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search..." oninput="filterTable()">
          <button class="btn btn-out" onclick="exportCSV()">⬇️ CSV</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <div id="tableContent"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        <div class="pagination" id="pagination" style="display:none">
          <div class="page-info" id="pageInfo"></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-out" id="prevBtn" onclick="changePage(-1)">← Prev</button>
            <button class="btn btn-out" id="nextBtn" onclick="changePage(1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="editModalTitle">Edit Row</div>
      <button onclick="closeEditModal()" class="btn btn-r" style="padding:5px 12px">✕</button>
    </div>
    <div id="editModalFields"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="saveEditRow()" class="btn btn-b" style="flex:1;padding:12px">💾 Save Changes</button>
      <button onclick="closeEditModal()" class="btn btn-out" style="flex:1;padding:12px">Cancel</button>
    </div>
  </div>
</div>

<script>
let currentTable=null, currentPage=1, totalPages=1, allRows=[], tableData={};
let editRowData={}, editTableName='', editRowId=null;

const TABLE_ICONS={passengers:'👤',drivers:'🚗',rides:'🛣️',payments:'💳',driver_documents:'📄',renter_requests:'🤝',ratings:'⭐',otp_verification:'🔐',admins:'👑',sos_alerts:'🚨'};
const TABLE_COLORS={passengers:'#1565C0',drivers:'#2E7D32',rides:'#E65100',payments:'#6A1B9A',driver_documents:'#00838F',renter_requests:'#AD1457',ratings:'#F57F17',otp_verification:'#37474F',admins:'#C62828',sos_alerts:'#B71C1C'};

// ── SAFE FETCH (handles HTML error pages) ────────────────────────────────────
async function safeFetch(url, opts={}) {
  try {
    const r = await fetch(url, {credentials:'include', ...opts});
    const text = await r.text();
    try { return {ok:r.ok, status:r.status, data:JSON.parse(text)}; }
    catch(e) {
      console.error('Non-JSON response from', url, ':', text.substring(0,200));
      return {ok:false, status:r.status, data:{success:false, message:'Server error ('+r.status+')'}};
    }
  } catch(e) {
    return {ok:false, status:0, data:{success:false, message:'Network error: '+e.message}};
  }
}

// ── STATS ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const {data} = await safeFetch('/api/db/stats');
  if(!data.success) return;
  const s=data.stats, t=new Date(data.timestamp).toLocaleTimeString();
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><span>👤</span><div><div class="stat-val">${s.passengers||0}</div><div class="stat-lbl">Passengers</div></div></div>
    <div class="stat"><span>🚗</span><div><div class="stat-val">${s.drivers||0}</div><div class="stat-lbl">Drivers</div></div></div>
    <div class="stat"><span>✅</span><div><div class="stat-val">${s.verified_drivers||0}</div><div class="stat-lbl">Verified</div></div></div>
    <div class="stat"><span>🟢</span><div><div class="stat-val">${s.available_drivers||0}</div><div class="stat-lbl">Available</div></div></div>
    <div class="stat"><span>🛣️</span><div><div class="stat-val">${s.rides||0}</div><div class="stat-lbl">Rides</div></div></div>
    <div class="stat"><span>🚦</span><div><div class="stat-val">${s.active_rides||0}</div><div class="stat-lbl">Active</div></div></div>
    <div class="stat"><span>💰</span><div><div class="stat-val">₹${s.total_revenue||0}</div><div class="stat-lbl">Revenue</div></div></div>
    <div class="stat"><span>📄</span><div><div class="stat-val">${s.driver_documents||0}</div><div class="stat-lbl">Docs</div></div></div>
    <div style="margin-left:auto;font-size:0.7rem;color:var(--t2);align-self:center">Updated: ${t}</div>`;
}

// ── TABLES LIST ───────────────────────────────────────────────────────────────
async function loadTables() {
  const {data} = await safeFetch('/api/db/tables');
  if(!data.success) return;
  tableData={};
  data.tables.forEach(t=>tableData[t.name]=t.rows);
  document.getElementById('tableList').innerHTML=data.tables.map(t=>`
    <button class="tb-btn ${currentTable===t.name?'active':''}" onclick="loadTable('${t.name}')">
      <span>${TABLE_ICONS[t.name]||'📋'} ${t.name}</span>
      <span class="cnt">${t.rows}</span>
    </button>`).join('');
  if(!currentTable) renderOverview(data.tables);
}

function renderOverview(tables) {
  document.getElementById('overviewSection').style.display='block';
  document.getElementById('tableSection').style.display='none';
  document.getElementById('pageTitle').textContent='📊 Database Overview';
  document.getElementById('overviewCards').innerHTML=tables.map(t=>`
    <div class="ov-card" onclick="loadTable('${t.name}')" style="border-top-color:${TABLE_COLORS[t.name]||'var(--y)'}">
      <div style="font-size:28px;margin-bottom:6px">${TABLE_ICONS[t.name]||'📋'}</div>
      <div class="num" style="color:${TABLE_COLORS[t.name]||'var(--b)'}">${t.rows}</div>
      <div class="name">${t.name}</div>
    </div>`).join('');
}

// ── LOAD TABLE ────────────────────────────────────────────────────────────────
async function loadTable(name, page=1) {
  currentTable=name; currentPage=page;
  document.getElementById('overviewSection').style.display='none';
  document.getElementById('tableSection').style.display='block';
  document.getElementById('pageTitle').textContent=`${TABLE_ICONS[name]||'📋'} ${name}`;
  document.getElementById('tableTitle').textContent=name;
  document.getElementById('tableContent').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  document.getElementById('pagination').style.display='none';
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().includes(name)));

  const {data} = await safeFetch(`/api/db/table/${name}?page=${page}&per_page=25`);
  if(!data.success){
    document.getElementById('tableContent').innerHTML=`<div class="empty"><div class="ic">⚠️</div><p>${data.message}</p></div>`;
    return;
  }
  allRows=data.rows; totalPages=data.pages;
  document.getElementById('tableMeta').textContent=`${data.total} rows • Page ${data.page}/${data.pages}`;
  renderTable(data.columns, data.rows);
  if(data.pages>1){
    document.getElementById('pagination').style.display='flex';
    document.getElementById('pageInfo').textContent=`${(page-1)*25+1}–${Math.min(page*25,data.total)} of ${data.total}`;
    document.getElementById('prevBtn').disabled=page<=1;
    document.getElementById('nextBtn').disabled=page>=data.pages;
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable(columns, rows) {
  if(!rows.length){
    document.getElementById('tableContent').innerHTML='<div class="empty"><div class="ic">📭</div><p>No records</p></div>';
    return;
  }
  const thead=`<thead><tr>${columns.map(c=>`<th>${c}</th>`).join('')}<th style="width:130px">Actions</th></tr></thead>`;
  const tbody=`<tbody>${rows.map(row=>`
    <tr id="row-${row.id}">${columns.map(col=>{
      const v=row[col];
      if(v===null||v===undefined) return `<td><span class="null-v">null</span></td>`;
      if(typeof v==='string'&&v.startsWith('[')&&v.includes('chars')) return `<td><span class="badge bgr">${v}</span></td>`;
      if(col==='status'||col==='verification_status') return `<td>${statusBadge(v)}</td>`;
      if(col==='is_available') return `<td>${v?'<span class="badge bg">✅ Yes</span>':'<span class="badge br">❌ No</span>'}</td>`;
      if(col==='role') return `<td><span class="badge bb">${v}</span></td>`;
      if(col.includes('_at')||col.includes('time')) return `<td class="mono" style="font-size:0.72rem">${v?new Date(v).toLocaleString():''}</td>`;
      if(typeof v==='number') return `<td class="mono">${v}</td>`;
      const d=String(v).length>38?String(v).substring(0,38)+'…':v;
      return `<td title="${String(v).replace(/"/g,'&quot;')}">${d}</td>`;
    }).join('')}
    <td style="white-space:nowrap">
      <button class="btn btn-b" style="padding:3px 9px;font-size:0.72rem" onclick="openEdit('${currentTable}',${row.id},${JSON.stringify(row).replace(/'/g,'&#39;')})">✏️</button>
      <button class="btn btn-r" style="padding:3px 9px;font-size:0.72rem;margin-left:3px" onclick="deleteRow('${currentTable}',${row.id})">🗑️</button>
      ${currentTable==='drivers'?`<button class="btn btn-g" style="padding:3px 8px;font-size:0.72rem;margin-left:3px" onclick="verifyDriver(${row.id})" title="Verify">✅</button>`:''}
    </td></tr>`).join('')}</tbody>`;
  document.getElementById('tableContent').innerHTML=`<div style="overflow-x:auto"><table>${thead}${tbody}</table></div>`;
}

function statusBadge(v){
  const m={'active':'bg','completed':'bb','pending':'by','cancelled':'br','verified':'bg','VERIFIED':'bg','PENDING':'by','APPROVED':'bg','REJECTED':'br','pending_verification':'by'};
  return `<span class="badge ${m[v]||'bgr'}">${v}</span>`;
}

function filterTable(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  if(!q){renderTable(Object.keys(allRows[0]||{}),allRows);return;}
  const f=allRows.filter(r=>Object.values(r).some(v=>String(v||'').toLowerCase().includes(q)));
  renderTable(Object.keys(allRows[0]||{}),f);
}

function changePage(d){const n=currentPage+d;if(n<1||n>totalPages)return;loadTable(currentTable,n);}

function exportCSV(){
  if(!allRows.length)return;
  const cols=Object.keys(allRows[0]);
  const csv=[cols.join(','),...allRows.map(r=>cols.map(c=>JSON.stringify(r[c]??'')).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`${currentTable}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── EDIT ROW ──────────────────────────────────────────────────────────────────
function openEdit(table, id, rowData){
  editTableName=table; editRowId=id; editRowData=rowData;
  const skip=new Set(['id','password','file_data','aadhaar_doc','rc_doc','live_selfie','qr_code','payment_qr_image']);
  document.getElementById('editModalTitle').textContent=`Edit ${table} #${id}`;
  document.getElementById('editModalFields').innerHTML=Object.entries(rowData)
    .filter(([k])=>!skip.has(k))
    .map(([k,v])=>`
      <label class="field-lbl">${k}</label>
      <input id="ef_${k}" class="field-inp" value="${v===null||v===undefined?'':String(v).replace(/"/g,'&quot;')}">`).join('');
  document.getElementById('editModal').style.display='flex';
}

function closeEditModal(){document.getElementById('editModal').style.display='none';}

async function saveEditRow(){
  const skip=new Set(['id','password','file_data','aadhaar_doc','rc_doc','live_selfie','qr_code','payment_qr_image']);
  const updates={};
  Object.keys(editRowData).forEach(k=>{
    if(skip.has(k))return;
    const el=document.getElementById('ef_'+k);
    if(el)updates[k]=el.value;
  });
  const {data}=await safeFetch(`/api/db/edit/${editTableName}/${editRowId}`,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)
  });
  if(data.success){closeEditModal();notify('✅ '+data.message,'#2E7D32');loadTable(editTableName,currentPage);}
  else notify('❌ '+data.message,'#C62828');
}

// ── DELETE ROW ────────────────────────────────────────────────────────────────
async function deleteRow(table, id){
  if(!confirm(`⚠️ Delete row #${id} from "${table}"?\n\nThis cannot be undone.`))return;
  const {data}=await safeFetch(`/api/db/delete/${table}/${id}`,{method:'DELETE'});
  if(data.success){notify('🗑️ '+data.message,'#2E7D32');loadTable(table,currentPage);}
  else notify('❌ '+data.message,'#C62828');
}

// ── VERIFY DRIVER ─────────────────────────────────────────────────────────────
async function verifyDriver(id){
  if(!confirm(`Verify driver #${id}? This marks them as verified and sends credentials.`))return;
  const {data}=await safeFetch(`/api/db/verify_driver/${id}`,{method:'POST'});
  notify(data.success?'✅ '+data.message:'❌ '+data.message, data.success?'#2E7D32':'#C62828');
  if(data.success)loadTable('drivers',currentPage);
}

// ── NOTIFY ────────────────────────────────────────────────────────────────────
function notify(msg, color='#2E7D32'){
  const n=document.createElement('div');
  n.className='notif';
  n.style.background=color;
  n.textContent=msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3500);
}

// ── REFRESH (MANUAL ONLY — no auto-refresh) ───────────────────────────────────
async function refreshAll(){
  await Promise.all([loadStats(),loadTables()]);
  if(currentTable)loadTable(currentTable,currentPage);
  notify('🔄 Refreshed','#1565C0');
}

async function adminLogout(){
  await safeFetch('/api/admin/logout',{method:'POST'});
  window.location.href='/admin';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadStats();
loadTables();
</script>
