<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield Background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Shape -->
  <path d="M 30 10 L 50 10 L 50 25 Q 50 40 40 45 Q 30 50 30 45 L 30 25 Z" 
        fill="url(#shieldGradient)" 
        stroke="#fff" 
        stroke-width="2"/>
  
  <!-- Car Icon -->
  <g transform="translate(32, 20)">
    <rect x="2" y="8" width="12" height="6" fill="#fff" rx="1"/>
    <circle cx="5" cy="16" r="2" fill="#fff"/>
    <circle cx="11" cy="16" r="2" fill="#fff"/>
    <path d="M 3 8 L 5 4 L 11 4 L 13 8" fill="#fff"/>
  </g>
  
  <!-- Text: RakshaRide -->
  <text x="60" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFC107">
    Raksha
  </text>
  <text x="60" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2196F3">
    Ride
  </text>
</svg>
